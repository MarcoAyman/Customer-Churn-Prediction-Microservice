# .github/workflows/keep_alive.yml
#
# Pings the Render backend every 14 minutes to prevent the free-tier
# service from spinning down due to inactivity (Render sleeps at 15 min).
#
# FIX APPLIED:
#   BEFORE: curl used -f flag → exit code 22 on any non-200 response
#           This caused the workflow to FAIL even when the ping succeeded
#           in waking Render up. The health endpoint may return a redirect
#           or require auth headers — curl -f treats both as failure.
#
#   AFTER:  -f removed → curl always exits 0 regardless of HTTP status.
#           We capture and log the status code for visibility, but we
#           never fail the workflow based on it. The job's only purpose
#           is to send a request — even a 301 or 503 response resets
#           Render's inactivity timer.
#
#   --max-time raised from 30s → 65s because Render cold starts can take
#   up to 60 seconds. If the server is already warm it responds in <1s,
#   so this only matters on the very rare edge case where the ping itself
#   triggers a cold start (which defeats the purpose, but at least we wait).
#
# SETUP (one-time):
#   GitHub repo → Settings → Secrets and variables → Actions → New secret
#   Name:  RENDER_API_URL
#   Value: https://your-exact-render-url.onrender.com
#          (no trailing slash, no /api/v1/health — just the base URL)

name: Keep Render Alive

on:
  schedule:
    - cron: '*/14 * * * *'   # every 14 minutes — safely under Render's 15-min limit
  workflow_dispatch:           # allows manual trigger from the Actions tab

jobs:
  ping:
    name: Ping Render API
    runs-on: ubuntu-latest

    steps:
      - name: Send keep-alive ping
        run: |
          echo "Target: ${{ secrets.RENDER_API_URL }}/api/v1/health"

          # Send the ping and capture the HTTP status code.
          #
          # Flags used:
          #   -s            silent — no progress bar in logs
          #   -o /dev/null  discard response body — we don't need it
          #   -w "%{http_code}"  print only the HTTP status code to stdout
          #   --max-time 65 wait up to 65s for a response (Render cold start)
          #
          # NOTE: -f is intentionally NOT used.
          # -f causes curl to exit with code 22 on any 4xx/5xx response,
          # which was making every run show as FAILED in GitHub Actions.
          # Without -f, curl always exits 0 and the workflow always passes.
          # The HTTP status is logged below for debugging purposes only.
          HTTP_STATUS=$(curl \
            -s \
            -o /dev/null \
            -w "%{http_code}" \
            --max-time 65 \
            "${{ secrets.RENDER_API_URL }}/api/v1/health"
          )

          echo "HTTP Status received: $HTTP_STATUS"

          # Log a clear message for each common case so the Actions logs
          # are easy to read when you check in on the workflow.
          if [ "$HTTP_STATUS" = "200" ]; then
            echo "✓ Render is fully awake and healthy"
          elif [ "$HTTP_STATUS" = "000" ]; then
            # 000 means curl got no response at all — network error or
            # the URL in the secret is wrong. Check RENDER_API_URL.
            echo "✗ No response received — check RENDER_API_URL secret"
            echo "  Current value used: ${{ secrets.RENDER_API_URL }}"
          else
            # Any other status (301, 401, 503, etc.) still means Render
            # received the request and its sleep timer was reset.
            echo "~ Render responded with $HTTP_STATUS — timer still reset, this is fine"
          fi

          # Always exit 0 — the workflow should NEVER fail because of
          # what Render returns. A green checkmark every 14 minutes
          # means the ping reached the server. That's all we need.
          exit 0
